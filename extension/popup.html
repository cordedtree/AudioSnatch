<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px; padding: 16px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #121212; color: #e0e0e0;
    }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #fff; }
    .btn {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      background: #6c5ce7; color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #5a4bd1; }
    .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .status { margin-top: 10px; font-size: 12px; color: #888; text-align: center; }
    .status.ok { color: #00b894; }
    .status.err { color: #ff6b6b; }
    .port-row { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; font-size: 12px; color: #888; }
    .port-input {
      width: 60px; padding: 4px 6px; border: 1px solid #333; border-radius: 4px;
      background: #1e1e1e; color: #fff; font-size: 12px; outline: none;
    }
  </style>
</head>
<body>
  <h1>AudioSnatch</h1>
  <div class="port-row">
    Port: <input type="number" class="port-input" id="port" value="9638">
  </div>
  <button class="btn" id="send">Send Current Tab to AudioSnatch</button>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
